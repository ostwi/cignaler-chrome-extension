<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cignaler Promo Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .icon-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .tagline {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      text-align: center;
      line-height: 1.4;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.3px;
    }
    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-row">
      <img class="icon" src="../icons/icon128.png" alt="Cignaler">
      <span class="title">Cignaler</span>
    </div>
    <span class="tagline">GitLab pipeline watchers — one click away</span>
    <div class="badge">
      <span class="dot"></span>
      Works with self-hosted GitLab
    </div>
  </div>
</body>
</html>
