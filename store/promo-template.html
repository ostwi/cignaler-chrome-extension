<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cignaler Promo Image</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      position: relative;
    }

    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(#e8e6e1 1px, transparent 1px);
      background-size: 16px 16px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, #000 60%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, #000 60%, transparent 100%);
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .icon {
      width: 80px;
      height: 80px;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1c1917;
    }

    .tagline {
      font-size: 15px;
      font-weight: 600;
      color: #78716c;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="dot-grid"></div>
  <div class="content">
    <img class="icon" src="../icons/cignaler_icon.png" alt="Cignaler">
    <span class="title">Cignaler</span>
    <span class="tagline">CI Pipeline Watcher</span>
  </div>
</body>
</html>
